name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup Visual Studio environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        
    - name: Setup vcpkg
      run: |
        # Clone vcpkg
        git clone https://github.com/microsoft/vcpkg.git
        cd vcpkg
        
        # Bootstrap vcpkg
        .\bootstrap-vcpkg.bat -disableMetrics
        
        # Install dependencies
        .\vcpkg.exe install gtest:x64-windows nlohmann-json:x64-windows
        
        # Integrate with Visual Studio
        .\vcpkg.exe integrate install
        
        # Show installed packages
        echo "Installed packages:"
        .\vcpkg.exe list
        
        cd ..
        
    - name: Create vcpkg response file
      run: |
        # Create a response file for MSBuild to find vcpkg
        $vcpkgRoot = "$(Get-Location)\vcpkg"
        $vcpkgToolchain = "$vcpkgRoot\scripts\buildsystems\vcpkg.cmake"
        
        @"
        /p:VcpkgEnabled=true
        /p:VcpkgEnableManifest=false
        /p:VcpkgManifestInstall=false
        /p:VcpkgRoot=$vcpkgRoot
        /p:VcpkgAutoLink=true
        /p:VcpkgTriplet=x64-windows
        "@ | Out-File -FilePath vcpkg.rsp -Encoding ascii
        
        echo "Created vcpkg response file:"
        Get-Content vcpkg.rsp
        
    - name: Modify project file to exclude main.cpp and include tests.cpp
      run: |
        # Display original project file for debugging
        echo "Original project file content:"
        Get-Content -Path "PClarity.vcxproj" | Select-String -Pattern "main.cpp|tests.cpp"
        
        # Create a backup of the project file
        Copy-Item -Path "PClarity.vcxproj" -Destination "PClarity.vcxproj.bak"
        
        # Modify the project file to exclude main.cpp and include tests.cpp
        $content = Get-Content -Path "PClarity.vcxproj" -Raw
        
        # Add ExcludedFromBuild property to main.cpp
        $pattern = "<ClCompile Include=`"main.cpp`" */?>"
        $replacement = "<ClCompile Include=`"main.cpp`"><ExcludedFromBuild>true</ExcludedFromBuild></ClCompile>"
        $content = $content -replace $pattern, $replacement
        
        # Make sure tests.cpp is included without ExcludedFromBuild
        $pattern = "<ClCompile Include=`"tests.cpp`".*?>(.*?)</ClCompile>"
        $replacement = "<ClCompile Include=`"tests.cpp`"></ClCompile>"
        $content = $content -replace $pattern, $replacement
        
        # If tests.cpp is not in the project, add it
        if ($content -notmatch "<ClCompile Include=`"tests.cpp`"") {
          $pattern = "(<ItemGroup>.*?<ClCompile Include=.*?/>)"
          $replacement = "`$1`n    <ClCompile Include=`"tests.cpp`" />"
          $content = $content -replace $pattern, $replacement
        }
        
        # Add vcpkg include path to project
        $vcpkgIncludePath = "$(Get-Location)\vcpkg\installed\x64-windows\include"
        $pattern = "(<ItemDefinitionGroup.*?<ClCompile>.*?)(<AdditionalIncludeDirectories>|</ClCompile>)"
        $replacement = "`$1<AdditionalIncludeDirectories>$vcpkgIncludePath;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>`$2"
        $content = $content -replace $pattern, $replacement
        
        # Add vcpkg lib path to project
        $vcpkgLibPath = "$(Get-Location)\vcpkg\installed\x64-windows\lib"
        $pattern = "(<ItemDefinitionGroup.*?<Link>.*?)(<AdditionalLibraryDirectories>|</Link>)"
        $replacement = "`$1<AdditionalLibraryDirectories>$vcpkgLibPath;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>`$2"
        $content = $content -replace $pattern, $replacement
        
        # Write the modified content back
        Set-Content -Path "PClarity.vcxproj" -Value $content
        
        # Display modified project file for verification
        echo "Modified project file content:"
        Get-Content -Path "PClarity.vcxproj" | Select-String -Pattern "main.cpp|tests.cpp|AdditionalIncludeDirectories|AdditionalLibraryDirectories"
        
        echo "✅ Modified project file to exclude main.cpp and include tests.cpp"
        
    - name: Build test project
      run: |
        echo "Building PClarity tests with Google Test..."
        
        # Build the project with vcpkg integration
        msbuild PClarity.vcxproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          @vcpkg.rsp
        
        if ($LASTEXITCODE -eq 0) {
          echo "✅ Test build completed successfully!"
        } else {
          echo "❌ Test build failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        
    - name: Run tests
      run: |
        # Copy required DLLs to the executable directory
        Copy-Item -Path "vcpkg\installed\x64-windows\bin\*.dll" -Destination "x64\Release\" -ErrorAction SilentlyContinue
        
        if (Test-Path "x64/Release/PClarity.exe") {
          echo "Running tests..."
          
          # Run the tests and capture the output
          cd x64/Release
          ./PClarity.exe
          $testResult = $LASTEXITCODE
          
          if ($testResult -eq 0) {
            echo "✅ All tests passed!"
          } else {
            echo "❌ Tests failed with exit code $testResult"
            exit $testResult
          }
        } else {
          echo "❌ Test executable not found"
          echo "Available build outputs:"
          if (Test-Path "x64") {
            Get-ChildItem "x64" -Recurse | ForEach-Object { 
              echo "  $($_.FullName)" 
            }
          } else {
            echo "  No x64 directory found"
          }
          exit 1
        }
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: x64/Release/PClarity.exe
        retention-days: 7